<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalar GCJ App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: white; }
        #btnInstalar { 
            padding: 20px 40px; font-size: 22px; background: #7b2cbf; 
            color: white; border: none; border-radius: 50px; 
            display: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h2>Sistema GCJ</h2>
    <p>Haz clic abajo para instalar la aplicación</p>
    <button id="btnInstalar">INSTALAR APP</button>

    <script>
        let swRegistration = null;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                swRegistration = reg;
                console.log("Service Worker Activo");
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btnInstalar').style.display = 'inline-block';
        });

        document.getElementById('btnInstalar').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('btnInstalar').style.display = 'none';
                    deferredPrompt = null;
                }
            }
        });
    </script>
</body>
</html>
