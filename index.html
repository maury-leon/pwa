<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCJ App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #installBanner { 
            position: fixed; bottom: 0; width: 100%; background: #7b2cbf; 
            color: white; padding: 20px; text-align: center; display: none; 
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxP0x6-WXeRylXrPSticPG3PeReRuant24xxON76RwBDjb4UgID5fGcfNOz0us1hG9iYA/exec"></iframe>

    <div id="installBanner">
        <p>¿Quieres acceso rápido? Instala la App de la Iglesia</p>
        <button id="installBtn" style="padding: 10px 20px;">Instalar Ahora</button>
    </div>

    <script>
        // Registro del Service Worker (Necesario para PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        const banner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            banner.style.display = 'block'; // Mostrar banner si es instalable
        });

        document.getElementById('installBtn').addEventListener('click', () => {
            banner.style.display = 'none';
            deferredPrompt.prompt();
        });
    </script>
</body>
</html>
