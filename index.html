<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCJ App</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=1P5zX6_4BuPD9fvKXjFjwQvux0PIuSZfV">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background-color: #ffffff; }
        
        /* El iframe ocupa toda la pantalla */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Estilo del botón de instalación flotante */
        #installContainer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #7b2cbf;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none; /* Se muestra solo si es instalable */
            z-index: 9999;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            min-width: 200px;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxP0x6-WXeRylXrPSticPG3PeReRuant24xxON76RwBDjb4UgID5fGcfNOz0us1hG9iYA/exec?authuser=0"></iframe>

    <div id="installContainer" onclick="installApp()">
        Instalar GCJ App en el celular
    </div>

    <script>
        // 1. Registrar el Service Worker (necesario para que aparezca el botón instalar)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Service Worker registrado correctamente.");
            });
        }

        // 2. Lógica del botón de instalación
        let deferredPrompt;
        const installBtn = document.getElementById('installContainer');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Evita que el navegador muestre su propio aviso automático
            e.preventDefault();
            deferredPrompt = e;
            // Muestra nuestro botón personalizado
            installBtn.style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('El usuario aceptó la instalación');
                        installBtn.style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            }
        }

        // Ocultar el botón si ya está instalada la app
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            console.log('App instalada con éxito');
        });
    </script>
</body>
</html>
