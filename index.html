<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instalar GCJ App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7b2cbf">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        #installBtn { 
            padding: 20px 30px; 
            font-size: 20px; 
            background-color: #7b2cbf; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            display: none; /* Se muestra solo si es instalable */
        }
    </style>
</head>
<body>
    <h2>GCJ App</h2>
    <p>Presiona el botón para instalar el sistema en tu inicio.</p>
    
    <button id="installBtn">Instalar App</button>

    <script>
        // Registrar el Service Worker (Sin esto no hay botón)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });

        document.getElementById('installBtn').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
            }
        });
    </script>
</body>
</html>
